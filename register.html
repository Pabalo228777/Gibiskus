<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вступить в отряд | Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="gallery.html">Фотогалерея</a></li>
                <li><a href="videogallery.html">Видео галерея</a></li>
                <li><a href="register.html">Вступить в отряд</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-wrapper">
            <h2>Регистрация нового сталкера</h2>
            <p style="margin-bottom: 20px; color: #ffffff;">Заполните форму, чтобы получить доступ к закрытой базе объектов.</p>

            <form action="#" method="POST" class="stalker-form">

                <div class="form-group">
                    <label for="username">Позывной (Имя):</label>
                    <input type="text" id="username" name="username" required minlength="3" placeholder="Например: Dream_Sidyak">
                </div>

                <div class="form-group">
                    <label for="email">Электронная почта:</label>
                    <input type="email" id="email" name="email" required placeholder="stalker@zone.com">
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Минимум 6 символов">
                </div>

                <div class="form-group">
                    <label for="password-confirm">Подтвердите пароль:</label>
                    <input type="password" id="password-confirm" name="password-confirm" required placeholder="Повторите пароль">
                </div>

                <button type="submit" class="btn-submit">Отправить заявку</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; создатель сайта Signa</p>
    </footer>

</body>
</html>
